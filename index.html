<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>"Quer saber se precisa declarar o imposto de renda 2025? Responda essas perguntas"</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg,#0b1a2f,#162f55);
      color: white;
      padding: 20px;
    }
    .box {
      max-width: 650px;
      margin: auto;
      background: #12294a;
      padding: 25px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }
    h1 {
      text-align: center;
      margin-bottom: 20px;
    }
    label {
      display: block;
      margin-top: 15px;
      font-size: 14px;
    }
    input, select {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border-radius: 8px;
      border: none;
      font-size: 14px;
    }
    button {
      margin-top: 25px;
      width: 100%;
      padding: 12px;
      background: #1e90ff;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }
    button:hover {
      background: #187bcd;
    }
    .resultado {
      margin-top: 20px;
      font-weight: bold;
      text-align: center;
      font-size: 16px;
    }
    .whatsapp {
      display: none;
      margin-top: 15px;
      text-align: center;
    }
    .whatsapp a {
      display: inline-block;
      padding: 10px 15px;
      background: #25D366;
      color: white;
      border-radius: 8px;
      text-decoration: none;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>📊 Quer saber se precisa declarar o imposto de renda 2025? Responda essas perguntas</h1>

    <label>Rendimentos anuais (R$):</label>
    <input type="number" id="rendimentos" placeholder="Ex: 30000">

    <label>Rendimentos isentos acima de R$ 200 mil?</label>
    <select id="isentos">
      <option value="0">Não</option>
      <option value="1">Sim</option>
    </select>

    <label>Possui bens acima de R$ 800 mil?</label>
    <select id="bens">
      <option value="0">Não</option>
      <option value="1">Sim</option>
    </select>

    <label>Teve ganho com venda de bens?</label>
    <select id="ganho">
      <option value="0">Não</option>
      <option value="1">Sim</option>
    </select>

    <button onclick="verificar()">Verificar</button>

    <div class="resultado" id="resultado"></div>

    <div class="whatsapp" id="whatsapp">
      <a href="https://wa.me/5548988079928" target="_blank">📞</a>
    </div>
  </div>

  <script>
    function verificar() {
      let rendimentos = parseFloat(document.getElementById('rendimentos').value) || 0;
      let isentos = document.getElementById('isentos').value;
      let bens = document.getElementById('bens').value;
      let ganho = document.getElementById('ganho').value;

      let obrigatorio = false;

      if (rendimentos > 35584.84) obrigatorio = true;
      if (isentos == 1) obrigatorio = true;
      if (bens == 1) obrigatorio = true;
      if (ganho == 1) obrigatorio = true;

      let resultado = document.getElementById('resultado');
      let whatsapp = document.getElementById('whatsapp');

      if (obrigatorio) {
        resultado.innerHTML = "⚠️ Você PRECISA declarar o Imposto de Renda, não perca tempo e nos chame no WhatsApp😊.";
        whatsapp.style.display = "block";
      } else {
        resultado.innerHTML = "✅ Você NÃO precisa declarar😉🦁.";
        whatsapp.style.display = "none";
      }
    }
  </script>
</body>
</html>
